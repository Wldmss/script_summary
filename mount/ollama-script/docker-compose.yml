version: "3.8"

services:
  ollama-server:
    image: ollama-eeve:v1
    container_name: ollama-server
    network_mode: "host"
    restart: always
    privileged: false
    shm_size: "2gb"
    environment:
      - OLLAMA_KEEP_ALIVE=0
      - OLLAMA_NUM_PARALLEL=1
      # - OLLAMA_DEBUG=1  # 만약 에러가 나면 이 주석을 풀고 로그를 보세요.
    volumes:
      - /data/mount_docker/ollama_root:/root/.ollama
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
