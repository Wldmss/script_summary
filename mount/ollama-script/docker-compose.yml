version: "3.8"

services:
  ollama-server:
    image: ollama-eeve:v1
    container_name: ollama-server
    # 운영 서버이므로 호스트 네트워크 모드 사용
    network_mode: "host"
    restart: always
    environment:
      - OLLAMA_KEEP_ALIVE=0
      - OLLAMA_NUM_PARALLEL=1
    # GPU 할당 설정
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
